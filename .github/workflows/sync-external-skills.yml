name: Sync External Skills

on:
  schedule:
    # 每日 UTC 00:00 触发
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run mode (仅输出操作，不实际执行)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-external-skills
  cancel-in-progress: true

jobs:
  sync:
    name: Sync External Skills
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run sync script
        run: |
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            node scripts/sync-external-skills.mjs --dry-run
          else
            node scripts/sync-external-skills.mjs
          fi

      - name: Create Pull Request
        if: github.event.inputs.dry_run != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: sync external skills"
          branch: chore/sync-external-skills
          title: "chore: sync external skills"
          body: |
            ## 外部 Skill 自动同步

            本 PR 由 GitHub Action 自动创建，同步了来自外部仓库的最新 Skill。

            ### 变更说明

            - 从 `config/repositories.yaml` 中配置的外部仓库拉取最新 Skill
            - 根据白名单/黑名单规则筛选后同步到 `skills/` 目录
            - 外部 Skill 已注入来源元数据（`source`、`sourceUrl`、`sourceRepo`、`readonly: true`）

            ### 注意事项

            - 外部 Skill 为只读，请勿直接修改，下次同步会覆盖
            - 如需排除某个 Skill，请更新 `config/repositories.yaml` 的 `exclude` 列表
          labels: |
            automated
            external-skills
          delete-branch: false
          base: main
